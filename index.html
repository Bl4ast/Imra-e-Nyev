<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha Interativa - Revelação dos Personagens</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        /* VC NÃO PODE ESQUECER ISSO: Cores de tudo */
        :root {
            --theme-color: #ffffff;
            --theme-glow: rgba(255, 255, 255, 0.5);
            --card-bg: rgba(20, 20, 25, 0.4); 
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        /* isso daqui faz ficar azulzinho */
        .theme-blue {
            --theme-color: #1E90FF;
            --theme-glow: rgba(30, 144, 255, 0.7);
            --card-bg: rgba(10, 15, 30, 0.5);
        }

        /* aquilo faz ficar rosa choq */
        .theme-pink {
            --theme-color: #FF1493;
            --theme-glow: rgba(255, 20, 147, 0.7);
            --card-bg: rgba(30, 10, 20, 0.5);
        }

        /* fundo escuro do além pra parecer o espaço sideral */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #eaeaea;
            background: 
                radial-gradient(circle at 20% 30%, rgba(30, 144, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(138, 43, 226, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at top, #0b1120 0%, #020306 100%);
        }

        /* pontinhos brancos piscando */ 
        #stars-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        .bg-star { 
             position: absolute; 
             background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%); 
             border-radius: 50%; 
             opacity: 0; 
             animation: twinkle 3s infinite alternate; 
         } 

         @keyframes twinkle { 
             0% { opacity: 0.05; transform: scale(0.7); } 
             100% { opacity: 0.4; transform: scale(1); } 
         } 

        /* telinha que aparece primeiro de todas */
        .intro-screen {
            position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center;
            background: transparent; z-index: 2;
        }

        .forest-container { position: absolute; bottom: 0; width: 100%; height: 40vh; z-index: 5; pointer-events: none; display: flex; flex-direction: column; justify-content: flex-end; }
        .forest-svg { width: 100%; height: 100%; filter: drop-shadow(0px -5px 15px rgba(0,0,0,0.9)); }
        .ground { width: 100%; height: 8vh; background: #020306; border-top: 1px solid rgba(255,255,255,0.02); }

        #start-btn {
             padding: 15px 40px; font-size: 1.2rem; 
             background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.5); 
             color: white; border-radius: 50px; cursor: pointer; transition: all 0.3s ease; 
             z-index: 100; backdrop-filter: blur(5px); text-transform: uppercase; letter-spacing: 2px; 
         } 
         #start-btn:hover { 
             background: rgba(255, 255, 255, 0.9); color: #05070a; box-shadow: 0 0 20px rgba(255, 255, 255, 0.5); transform: scale(1.05); 
         }

        /* VC NÃO PODE ESQUECER ISSO: faz as estrelas cair vrum vrum */
        .falling-star { position: absolute; top: -150px; width: 45px; height: 45px; border-radius: 50%; opacity: 0; z-index: 20; display: flex; justify-content: center; transition: opacity 0.5s ease, filter 0.5s ease, transform 0.8s ease-in, background 0.4s, box-shadow 0.4s; }
        .falling-star::after { content: ''; position: absolute; bottom: 50%; width: 12px; height: 300px; border-radius: 10px; opacity: 0; z-index: -1; transition: opacity 0.3s; }
        
        .dark-blue { left: 25%; background: #00008B; box-shadow: 0 0 30px 10px rgba(0, 0, 139, 0.8), inset 0 0 15px rgba(100, 150, 255, 0.8); }
        .dark-blue::after { background: linear-gradient(to top, #00008B, transparent); }
        
        .pink-star { right: 25%; background: #FF1493; box-shadow: 0 0 30px 10px rgba(255, 20, 147, 0.8), inset 0 0 15px rgba(255, 105, 180, 0.8); }
        .pink-star::after { background: linear-gradient(to top, #FF1493, transparent); }
        
        .fall { animation: meteorDrop 1.5s cubic-bezier(0.5, 0, 0.8, 1) forwards, hoverGround 3s ease-in-out infinite 1.5s; }
        .fall::after { animation: showTrail 1.5s forwards; }
        
        @keyframes showTrail { 0% { opacity: 0; height: 50px; } 20% { opacity: 1; height: 300px; } 75% { opacity: 1; height: 200px; } 80% { opacity: 0; height: 0; } 100% { opacity: 0; } }
        @keyframes meteorDrop { 0% { top: -150px; transform: scale(1); opacity: 0; } 10% { opacity: 1; } 75% { top: calc(100vh - 200px); transform: scaleY(1.8) scaleX(0.5); } 80% { top: calc(100vh - 130px); transform: scaleY(0.3) scaleX(1.8); } 100% { top: calc(100vh - 160px); transform: scale(1); opacity: 1; } }
        @keyframes hoverGround { 0% { top: calc(100vh - 160px); } 50% { top: calc(100vh - 165px); } 100% { top: calc(100vh - 160px); } }
        
        .char-img { position: absolute; bottom: -5px; left: 50%; width: 280px; height: auto; transform: translateX(-50%) scale(0) translateY(40px); opacity: 0; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease-out, filter 0.4s ease; }
        #img-blue { filter: drop-shadow(0 0 15px rgba(30, 144, 255, 0.6)); }
        #img-pink { filter: drop-shadow(0 0 15px rgba(255, 20, 147, 0.6)); }
        
        .morph-active { background: transparent !important; box-shadow: none !important; }
        .morph-active .char-img { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
        
        .star-text { position: absolute; top: -280px; display: flex; flex-direction: column; align-items: center; color: white; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.8s ease; }
        .char-name { font-size: 1.3rem; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
        .player-name { font-size: 0.85rem; font-weight: normal; color: #ffffff; margin-top: 3px; letter-spacing: 1px; }
        
        #text-blue { text-shadow: 0px 2px 4px rgba(0,0,0,1), 0 0 10px #00008B, 0 0 20px #4169E1, 0 0 30px #00008B; }
        #text-pink { text-shadow: 0px 2px 4px rgba(0,0,0,1), 0 0 10px #FF1493, 0 0 20px #FF69B4, 0 0 30px #FF1493; }
        .show-text { opacity: 1 !important; }
        
        /* bang BUM poof */
        .crater, .shockwave { position: absolute; top: calc(100vh - 140px); border-radius: 50%; pointer-events: none; opacity: 0; transform: scale(0); }
        .crater { width: 100px; height: 25px; background: #000; z-index: 15; }
        .crater-blue { left: calc(25% - 27.5px); box-shadow: inset 0 0 15px rgba(0,0,139,1), 0 0 30px rgba(0,0,139,0.4); border: 2px solid #00008B; }
        .crater-pink { right: calc(25% - 27.5px); box-shadow: inset 0 0 15px rgba(255,20,147,1), 0 0 30px rgba(255,20,147,0.4); border: 2px solid #FF1493; }
        
        .form-crater { animation: openCrater 0.4s ease-out forwards; animation-delay: 1.2s; }
        @keyframes openCrater { 0% { transform: scale(0); opacity: 1; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        
        .shockwave { width: 100px; height: 25px; z-index: 14; }
        .sw-blue { left: calc(25% - 27.5px); border: 4px solid rgba(0, 0, 139, 0.8); }
        .sw-pink { right: calc(25% - 27.5px); border: 4px solid rgba(255, 20, 147, 0.8); }
        
        .impact-wave { animation: expandWave 0.8s ease-out forwards; animation-delay: 1.2s; }
        @keyframes expandWave { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(6); opacity: 0; border-width: 0; } }
        .fade-out { opacity: 0 !important; pointer-events: none; }

        /* faz aquela listra dividir a tela na metade pra escolher */
        .split-divider {
            position: absolute; left: 50%; top: 0; width: 2px; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.6), transparent);
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
            transform: translateX(-50%) scaleY(0); transform-origin: center;
            z-index: 25; opacity: 0; pointer-events: none;
        }

        .selection-active .split-divider { 
            animation: drawLine 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes drawLine {
            0% { transform: translateX(-50%) scaleY(0); opacity: 0; width: 1px; box-shadow: 0 0 0px rgba(255,255,255,0); }
            50% { opacity: 1; width: 4px; box-shadow: 0 0 40px 10px rgba(255,255,255,1); }
            100% { transform: translateX(-50%) scaleY(1); opacity: 1; width: 2px; box-shadow: 0 0 15px rgba(255,255,255,0.5); }
        }

        .split-panel {
            position: absolute; top: 0; width: 50%; height: 100%;
            z-index: 30; cursor: pointer; pointer-events: none;
            transition: background-color 0.5s ease, backdrop-filter 0.5s ease;
        }
        .split-left { left: 0; }
        .split-right { right: 0; }

        .selection-active .split-panel { pointer-events: auto; }

        .split-panel::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; transition: opacity 0.5s ease; pointer-events: none;
        }
        .split-left::before { background: radial-gradient(circle at 25% 50%, rgba(30, 144, 255, 0.25) 0%, transparent 60%); }
        .split-right::before { background: radial-gradient(circle at 75% 50%, rgba(255, 20, 147, 0.25) 0%, transparent 60%); }

        .intro-screen.hover-left .split-right { background-color: rgba(0, 0, 0, 0.75); backdrop-filter: grayscale(80%); }
        .intro-screen.hover-right .split-left { background-color: rgba(0, 0, 0, 0.75); backdrop-filter: grayscale(80%); }
        .intro-screen.hover-left .split-left::before { opacity: 1; }
        .intro-screen.hover-right .split-right::before { opacity: 1; }

        .char-img { 
            position: absolute; bottom: -5px; left: 50%; width: 280px; height: auto; 
            transform: translateX(-50%) scale(0) translateY(40px); opacity: 0; 
            transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.4s ease-out, filter 0.4s ease; 
        }
        
        #img-blue { filter: drop-shadow(0 0 15px rgba(30, 144, 255, 0.4)); }
        #img-pink { filter: drop-shadow(0 0 15px rgba(255, 20, 147, 0.4)); }

        .intro-screen.hover-left #star-pink { opacity: 0.2 !important; filter: grayscale(100%); transform: scale(0.95); }
        .intro-screen.hover-left #img-blue { transform: translateX(-50%) scale(1.1) translateY(-10px); filter: drop-shadow(0 0 40px rgba(30, 144, 255, 0.9)); }
        .intro-screen.hover-right #star-blue { opacity: 0.2 !important; filter: grayscale(100%); transform: scale(0.95); }
        .intro-screen.hover-right #img-pink { transform: translateX(-50%) scale(1.1) translateY(-10px); filter: drop-shadow(0 0 40px rgba(255, 20, 147, 0.9)); }

        /* arruma os bonecos na tela */
        #profile-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 300; opacity: 0; pointer-events: none; transition: opacity 1s ease-in-out; 
            background: linear-gradient(to bottom, rgba(2, 3, 6, 0.6) 0%, rgba(2, 3, 6, 0.85) 100%);
            overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth;
        }

        .show-profile { opacity: 1 !important; pointer-events: auto !important; }

        #profile-screen::-webkit-scrollbar { width: 8px; }
        #profile-screen::-webkit-scrollbar-track { background: transparent; }
        #profile-screen::-webkit-scrollbar-thumb { background: var(--theme-color); border-radius: 10px; }

        #btn-close {
            position: fixed; top: 20px; right: 30px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); 
            color: white; font-size: 2rem; width: 50px; height: 50px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; z-index: 400; backdrop-filter: blur(5px);
        }
        #btn-close:hover { background: var(--theme-color); color: #fff; transform: scale(1.1); border-color: transparent;}

        .profile-layout {
            max-width: 1200px; margin: 0 auto; padding: 80px 20px 100px 20px;
            display: grid; grid-template-columns: 360px 1fr; gap: 40px; align-items: start;
        }
        @media (max-width: 950px) {
            .profile-layout { grid-template-columns: 1fr; }
            .profile-sidebar { position: relative !important; top: 0 !important; }
            .bento-row-1 { grid-template-columns: 1fr !important; }
        }

        .glass-card {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        }
        .section-title { font-size: 1.2rem; color: var(--theme-color); text-transform: uppercase; letter-spacing: 2px; margin: 0 0 15px 0; font-weight: bold;}

        /* barrinha lateral que fica parada ali */
        .profile-sidebar { position: sticky; top: 40px; display: flex; flex-direction: column; gap: 25px; }
        .profile-header { text-align: center; display: flex; flex-direction: column; align-items: center; }
        .profile-avatar { width: 160px; height: 160px; border-radius: 50%; background-size: cover; background-position: center; border: 3px solid var(--theme-color); box-shadow: 0 0 25px var(--theme-glow); margin-bottom: 20px; }
        .profile-name { font-size: 2.5rem; margin: 0; text-transform: uppercase; letter-spacing: 3px; color: #fff; text-shadow: 0 0 10px var(--theme-glow); }
        .profile-class { font-size: 1rem; color: #aaa; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; margin-bottom: 25px;}

        .tech-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-bottom: 10px;}
        .info-box { background: rgba(0,0,0,0.4); border-radius: 15px; padding: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.05);}
        .info-label { font-size: 0.75rem; color: var(--theme-color); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px; }
        .info-value { font-size: 1rem; font-weight: bold; color: #fff; }
        .info-objective { grid-column: span 2; } 

        /* o lado grande onde fica o texto e as fotos */
        .profile-main { display: flex; flex-direction: column; gap: 25px; }
        .bento-row-1 { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 25px; }
        .appearance-text { font-size: 1.05rem; line-height: 1.7; color: #ddd; }

        .model-container { width: 100%; height: 250px; background: rgba(0, 0, 0, 0.4); border-radius: 16px; overflow: hidden; position: relative; box-shadow: inset 0 0 30px rgba(0,0,0,0.5); }
        model-viewer { width: 100%; height: 100%; outline: none; }

        .spotify-wrapper { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .spotify-wrapper iframe { border-radius: 16px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        .inspirations-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; }
        .insp-item { aspect-ratio: 1; background: #111; background-size: cover; background-position: center; border-radius: 12px; border: 1px solid var(--glass-border); transition: 0.4s; opacity: 0.8; cursor: pointer; }
        .insp-item:hover { opacity: 1; border-color: var(--theme-color); box-shadow: 0 10px 20px var(--theme-glow); transform: scale(1.05); z-index: 2; }

        .btn-curiosities {
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            border: 1px solid var(--theme-color); color: #fff; padding: 25px; font-size: 1.2rem;
            text-transform: uppercase; letter-spacing: 3px; border-radius: 24px; cursor: pointer; transition: 0.4s;
            display: flex; justify-content: center; align-items: center; gap: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .btn-curiosities:hover { background: var(--theme-color); color: #000; font-weight: bold; box-shadow: 0 10px 30px var(--theme-glow); transform: translateY(-5px); }

        /* abre do ladinho de fininho */
        .curiosity-drawer {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 500px; height: 100%;
            background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid var(--theme-color); box-shadow: -20px 0 50px rgba(0,0,0,0.8);
            z-index: 500; transition: right 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding: 50px 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 30px;
        }
        .curiosity-drawer.open { right: 0; }

        .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 499; opacity: 0; pointer-events: none; transition: 0.5s; }
        .drawer-overlay.open { opacity: 1; pointer-events: auto; }

        .drawer-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 20px; }
        .drawer-title { font-size: 1.8rem; color: #fff; margin: 0; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--theme-glow);}
        
        .btn-close-drawer { background: transparent; border: none; color: var(--theme-color); font-size: 2.5rem; cursor: pointer; transition: 0.3s; line-height: 1;}
        .btn-close-drawer:hover { transform: scale(1.2); text-shadow: 0 0 15px var(--theme-glow); }

        .curiosity-list { display: flex; flex-direction: column; gap: 20px; }
        .curiosity-card { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 16px; padding: 25px; border-left: 4px solid var(--theme-color); font-size: 1.05rem; line-height: 1.6; color: #ddd; transition: 0.3s;}
        .curiosity-card:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); border-color: var(--theme-color); box-shadow: 0 5px 15px var(--theme-glow);}

        /* clicar ali nos bglho lateral faz isso daqui */
        .personality-btn {
            background: rgba(0,0,0,0.4); border: 2px solid var(--theme-color);
            color: var(--theme-color); padding: 15px; font-size: 1rem;
            text-transform: uppercase; letter-spacing: 2px; border-radius: 30px;
            cursor: pointer; transition: 0.3s; width: 100%; margin-top: 15px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .personality-btn:hover { background: var(--theme-color); color: #000; font-weight: bold; box-shadow: 0 0 20px var(--theme-glow); }

        /* a caixa de texto enorme q tampa a visão de tudo */
        .pers-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 3, 6, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: all 0.5s ease;
        }
        .pers-modal-overlay.open { opacity: 1; pointer-events: auto; }

        .pers-modal-content {
            background: var(--card-bg); border: 2px solid var(--theme-color);
            border-radius: 30px; width: 90%; max-width: 800px; max-height: 85vh;
            padding: 50px; position: relative; overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 30px var(--theme-glow);
            transform: translateY(50px) scale(0.95); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }
        .pers-modal-overlay.open .pers-modal-content { transform: translateY(0) scale(1); }

        .btn-close-pers {
            position: absolute; top: 20px; right: 30px; background: transparent; border: none; color: var(--theme-color); 
            font-size: 2.5rem; cursor: pointer; transition: 0.3s; line-height: 1;
        }
        .btn-close-pers:hover { transform: scale(1.2) rotate(90deg); text-shadow: 0 0 15px var(--theme-glow); }

        .pers-title { font-size: 3.5rem; margin: 0 0 5px 0; text-transform: uppercase; letter-spacing: 4px; color: var(--theme-color); text-shadow: 0 0 15px var(--theme-glow), 0 0 30px var(--theme-color); }
        .pers-subtitle { font-size: 1.2rem; margin: 0 0 40px 0; font-style: italic; letter-spacing: 2px; color: var(--theme-color); opacity: 0.8; text-shadow: 0 0 10px var(--theme-glow); }
        
        .pers-text-box {
            font-size: 1.15rem; line-height: 1.9; color: #ddd; text-align: justify;
            background: rgba(0,0,0,0.5); padding: 30px; border-radius: 15px; 
            border: 1px solid var(--glass-border); border-left: 4px solid var(--theme-color); 
        }
        .pers-text-box p { margin-top: 0; margin-bottom: 20px; }
        .pers-text-box p:last-child { margin-bottom: 0; }
        .pers-modal-content::-webkit-scrollbar { width: 6px; }
        .pers-modal-content::-webkit-scrollbar-track { background: transparent; }
        .pers-modal-content::-webkit-scrollbar-thumb { background: var(--theme-color); border-radius: 10px; }


        /* VC NÃO PODE ESQUECER ISSO, a aba gigante com a lore dos caba */
        #lore-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111319; 
            z-index: 600; 
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
            overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth;
        }
        #lore-screen.show-lore { opacity: 1; pointer-events: auto; }

        /* negocinho de rolar a pagina pra não ficar feio */
        #lore-screen::-webkit-scrollbar { width: 8px; }
        #lore-screen::-webkit-scrollbar-track { background: #111319; }
        #lore-screen::-webkit-scrollbar-thumb { background: var(--theme-color); border-radius: 10px; }

        #btn-back-lore {
            position: fixed; top: 20px; left: 20px;
            background: rgba(0,0,0,0.6); border: 1px solid var(--glass-border);
            color: white; padding: 10px 20px; border-radius: 8px;
            cursor: pointer; z-index: 610; backdrop-filter: blur(10px);
            font-size: 1rem; letter-spacing: 1px; transition: 0.3s;
        }
        #btn-back-lore:hover { background: var(--theme-color); color: #000; font-weight: bold; }

        .notion-cover { 
            width: 100%; height: 35vh; background-size: cover; background-position: center; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        
        .notion-container { max-width: 900px; margin: 0 auto; padding: 0 40px 100px 40px; position: relative; }
        
        .notion-icon { 
            width: 130px; height: 130px; border-radius: 15px; 
            background-size: cover; background-position: center; 
            border: 5px solid #111319; box-shadow: 0 5px 15px rgba(0,0,0,0.5); 
            margin-top: -65px; margin-bottom: 20px;
        }
        
        .notion-title {

            });
        }

        function diveIntoStar(clickedContainer, otherContainer, crater, otherCrater, chave) {
            panelLeft.style.pointerEvents = 'none'; panelRight.style.pointerEvents = 'none';
            introDiv.classList.remove('hover-left', 'hover-right', 'selection-active');
            
            otherContainer.classList.add('fade-out'); otherCrater.classList.add('fade-out'); crater.classList.add('fade-out'); 

            const rect = clickedContainer.getBoundingClientRect();
            clickedContainer.style.transform = 'scale(3)'; clickedContainer.style.opacity = '0'; 
            
            const auraClone = document.createElement('div');
            auraClone.style.position = 'fixed'; auraClone.style.left = rect.left + 'px'; auraClone.style.top = rect.top + 'px';
            auraClone.style.width = '45px'; auraClone.style.height = '45px'; auraClone.style.borderRadius = '50%';
            auraClone.style.zIndex = '99'; auraClone.style.pointerEvents = 'none';
            
            if (chave === 'imra') {
                auraClone.style.background = '#00008B'; auraClone.style.boxShadow = '0 0 30px 10px rgba(0, 0, 139, 0.8), inset 0 0 15px rgba(100, 150, 255, 0.8)';
            } else {
                auraClone.style.background = '#FF1493'; auraClone.style.boxShadow = '0 0 30px 10px rgba(255, 20, 147, 0.8), inset 0 0 15px rgba(255, 105, 180, 0.8)';
            }
            
            document.body.appendChild(auraClone);
            carregarPerfil(chave);

            setTimeout(() => {
                const centerX = window.innerWidth / 2; const centerY = window.innerHeight / 2;
                const startX = rect.left + 22.5; const startY = rect.top + 22.5; 
                auraClone.style.transition = 'transform 1.1s cubic-bezier(0.7, 0, 0.2, 1)';
                auraClone.style.transform = `translate(${centerX - startX}px, ${centerY - startY}px) scale(200)`;
            }, 20);

            setTimeout(() => {
                document.getElementById('profile-screen').classList.add('show-profile');
                document.getElementById('intro').style.display = 'none';
            }, 600); 
        }

        panelLeft.addEventListener('click', () => diveIntoStar(blueStar, pinkStar, document.getElementById('c-blue'), document.getElementById('c-pink'), 'imra'));
        panelRight.addEventListener('click', () => diveIntoStar(pinkStar, blueStar, document.getElementById('c-pink'), document.getElementById('c-blue'), 'nyev'));

        // Abre e fecha a gaveta de curiosidade zzz
        const btnOpenDrawer = document.getElementById('btn-open-drawer');
        const btnCloseDrawer = document.getElementById('btn-close-drawer');
        const curiosityPanel = document.getElementById('curiosity-panel');
        const drawerBg = document.getElementById('drawer-bg');

        btnOpenDrawer.addEventListener('click', () => { curiosityPanel.classList.add('open'); drawerBg.classList.add('open'); });
        btnCloseDrawer.addEventListener('click', () => { curiosityPanel.classList.remove('open'); drawerBg.classList.remove('open'); });
        drawerBg.addEventListener('click', () => { curiosityPanel.classList.remove('open'); drawerBg.classList.remove('open'); });

        // Abre e fecha a janela que pula na tela
        const btnOpenPers = document.getElementById('btn-open-pers');
        const btnClosePers = document.getElementById('btn-close-pers');
        const persModal = document.getElementById('pers-modal');

        btnOpenPers.addEventListener('click', () => persModal.classList.add('open'));
        btnClosePers.addEventListener('click', () => persModal.classList.remove('open'));
        persModal.addEventListener('click', (e) => { if (e.target === persModal) persModal.classList.remove('open'); });

        // Botões que levam pra página de historinha
        const btnOpenLore = document.getElementById('btn-open-lore');
        const btnBackLore = document.getElementById('btn-back-lore');
        const loreScreen = document.getElementById('lore-screen');

        btnOpenLore.addEventListener('click', () => {
            loreScreen.classList.add('show-lore');
        });

        btnBackLore.addEventListener('click', () => {
            loreScreen.classList.remove('show-lore');
        });

    </script>
</body>
</html>
